runtime: python312

buildCommand: pip install -r backend/requirements.txt

runCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

environmentVariables:
  - variable: FIREBASE_PROJECT
    value: forge-3d-c12ff
  - variable: PYTHONPATH
    value: /workspace/backend

env:
  - variable: PORT
    availability:
      - BUILD
      - RUNTIME
